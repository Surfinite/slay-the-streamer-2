<!doctype html>
<!--
  SYNTHETIC fixture — models the FINAL response body returned by
  `GET https://www.youtube.com/channel/{CHANNEL_ID}/live` AFTER all redirects have been
  followed, when the channel is currently broadcasting a live stream. In real YouTube
  responses the redirect chain typically terminates at `https://www.youtube.com/watch?v={VIDEO_ID}`
  and the body is the standard watch-page HTML.

  Reference-only: Task 16's `YouTubeLiveBroadcastDiscoveryTests` use a `RedirectingFakeHttp`
  mock that returns the `Location:` header without consuming this body. The fixture exists
  because the plan (Task 1, plan line 90) listed it, and because a future discovery
  implementation that falls back to body-inspection (e.g., when no redirect occurs but the
  channel IS live and YouTube has switched to a JS-side video routing) would inspect the
  markers below:
    * <link rel="canonical" href="https://www.youtube.com/watch?v={VIDEO_ID}">
    * <meta property="og:url" content="https://www.youtube.com/watch?v={VIDEO_ID}">
    * embedded `ytInitialData` with `currentVideoEndpoint.watchEndpoint.videoId`

  All identifiers are synthetic placeholders matching this repository's fixture conventions
  (`FIXTUREvid001`, `UCfixture001`, etc.). See `tests/Fixtures/youtube_live_chat_page.html`
  for the related live-chat-page fixture.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Fixture Live Broadcast - YouTube</title>
<link rel="canonical" href="https://www.youtube.com/watch?v=FIXTUREvid001">
<meta property="og:url" content="https://www.youtube.com/watch?v=FIXTUREvid001">
<meta property="og:type" content="video.other">
<meta property="og:title" content="Fixture Live Broadcast">
<meta property="og:video:url" content="https://www.youtube.com/embed/FIXTUREvid001">
<meta name="twitter:url" content="https://www.youtube.com/watch?v=FIXTUREvid001">
</head>
<body>

<script nonce="FIXTUREnonce001">
window["ytInitialData"] = {
